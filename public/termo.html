<!DOCTYPE html>
<html lang="pt-BR">

</head>

    <h1>Termo REST</h1>

        <button type="button" onclick="conectar()">Conectar</button>
    </div>

    <div id="board"></div>

    <div class="inputs">
        <input type="text" maxlength="1" disabled>
        <input type="text" maxlength="1" disabled>
        <input type="text" maxlength="1" disabled>
        <input type="text" maxlength="1" disabled>
        <input type="text" maxlength="1" disabled>
    </div>

    <button type="button" id="btnEnviar" class="btn-enviar" onclick="enviarPalpite()" disabled>
        Enviar
    </button>

    <p class="mensagem">Arquitetura Orientada a Serviços — Unis</p>

    <div id="toast"></div>

    <script src="js/termo.js"></script>

</html>
